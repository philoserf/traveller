name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Add GOPATH/bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2

      - name: Install go-task
        run: |
          sh -c "$(curl -sSfL https://taskfile.dev/install.sh)" -- -d -b "$(go env GOPATH)/bin"

      # Runs the exact same task definitions a contributor runs locally
      # (`task check`) — Taskfile.yml is the single source of truth for
      # what "passing" means, not a separate CI-only script.
      - name: Run checks
        run: task check
