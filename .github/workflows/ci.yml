name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # No go.sum exists to key a cache on — go.mod has no require
          # block at all (depguard enforces std-lib-only, see .golangci.yml)
          # — so the default cache:true just fails to restore every run.
          cache: false

      - name: Add GOPATH/bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # go install rather than each tool's own curl-pipe-sh install
      # script: it verifies via the Go module proxy's checksum database,
      # which is far more reliable than a release-binary checksum file —
      # golangci-lint's own install.sh failed checksum verification on
      # this runner architecture when first tried here.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Install go-task
        run: go install github.com/go-task/task/v3/cmd/task@v3.52.0

      # Runs the exact same task definitions a contributor runs locally
      # (`task check`) — Taskfile.yml is the single source of truth for
      # what "passing" means, not a separate CI-only script.
      - name: Run checks
        run: task check
